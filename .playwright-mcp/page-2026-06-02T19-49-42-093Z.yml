                                  - generic [active] [ref=f3e1]:
                                    - paragraph [ref=f3e2]: Our hoods are made from cabinet-grade plywood with a white maple veneer. Brass and Steel Accents are created using a cabinet-grade laminate adhered to a white maple veneer.
                                    - paragraph [ref=f3e3]: Hoodsly’s wood range hoods come in an array of designs and colors to match your kitchen perfectly. Get your wood range hood in raw, primed/paint ready, or stained/painted. Choose one of our trending colors or match your kitchen with a custom color choice. Designed to be both elegant and effective, each wood range hood was built with our proprietary two-piece construction for easy installation, allowing for simple cleaning and easy access to fan and ducting.
                                    - paragraph [ref=f3e4]: Our Trimless Style hoods are only compatible with our TradeWinds ventilation units
                                    - paragraph [ref=f3e5]: We only recommend cleaning your range hood with CLEAR, FRAGRANCE-FREE Dawn dish soap. View full cleaning instructions.
                                    - paragraph [ref=f3e6]: "IMPORTANT WOODWORKING INFORMATION: You should choose a licensed electrician, and/or HVAC Contractor, and a cabinet installation professional to assist with the install. Above all, ensure you are meeting all building codes in your area. While this installation is not difficult, you must have electrical, ventilation, and finish carpentry skills. You may need to cut, sand, chisel, remove “ribs”, install supports and other basic woodworking functions to complete the install."
                                    - paragraph [ref=f3e7]: "PLEASE NOTE: The product images displayed are computer generated renderings, and actual colors & wood grain may vary depending on the device you're viewing them on. For a clearer understanding of our products and their colors, we recommend exploring our gallery, contacting us directly, or requesting color samples. We're here to ensure you have the most accurate information possible!"
